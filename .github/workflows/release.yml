name: Release

# ============================================================================
# CCNim 发布流水线 —— 用法备忘
# ============================================================================
# 触发方式：
# - 推送 `vX.Y.Z` 形式的 tag（推荐）
# - 在 Actions 页手动 dispatch
#
# 流水线会做的事：
# 1. matrix 三个平台并行 build：
#    - Windows: NSIS 安装包（.exe）
#    - macOS:   DMG 安装包（.dmg / aarch64+x64）
#    - Linux:   AppImage（.AppImage，便携格式，updater 唯一支持的 Linux 格式）
# 2. tauri-action 用 secrets 里的私钥给安装包做 minisign 签名
# 3. 生成 `latest.json`（包含版本号 / 下载链接 / 签名串），客户端的
#    `tauri-plugin-updater` 就靠这个文件发现新版本
# 4. 三个平台 build 都跑完后，publish-release job 把 draft release 转
#    为 published，仓库主页右栏 Releases 立刻可见
# 5. 任何一个平台 build 失败时，release 会留 draft 状态等人工排查
#
# ----------------------------------------------------------------------------
# 必需的仓库 Secrets（Settings → Secrets and variables → Actions）
# ----------------------------------------------------------------------------
# TAURI_SIGNING_PRIVATE_KEY 私钥原文，base64 整段。
# 本地用 `npx tauri signer generate
# --ci -p <密码> -w <文件路径>` 生成。
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD 生成私钥时设的密码。
#
# ⚠️ 私钥一旦丢失，后续就无法签出能被现有客户端接受的更新包；老用户的
# 自动更新会卡死，只能升级 `src-tauri/tauri.conf.json` 里的 pubkey
# 重新发布并提示用户手动重装。请把私钥同时备份到密码管理器。
#
# ----------------------------------------------------------------------------
# 可选的 macOS 代码签名 Secrets（需要 Apple Developer 账号）
# ----------------------------------------------------------------------------
# APPLE_SIGNING_IDENTITY 代码签名证书名称，如 "Developer ID Application: Your Name"
# APPLE_ID  Apple ID（用于 notarization）
# APPLE_PASSWORD  App Specific Password（从 Apple ID 页面生成）
# APPLE_TEAM_ID   Apple Developer Team ID
#
# 如果不配置这些，打包出来的 .dmg 会提示 "应用来自不明开发者"，
# 用户需要右键 → 打开才能运行。配置后可以自动 notarize（公证）。
#
# ----------------------------------------------------------------------------
# 发布一个新版本的标准操作（本地执行）
# ----------------------------------------------------------------------------
# 1. 同步改三处版本号（必须保持一致，否则 updater 会算错）：
#    - package.json "version"
#    - src-tauri/tauri.conf.json "version"
#    - src-tauri/Cargo.toml [package].version
#    然后 `cargo update -p ccnim` 更新 Cargo.lock
# 2. git commit -am "release: vX.Y.Z"
#    git tag vX.Y.Z
#    git push origin main --tags
# 3. 等这个 workflow 跑完（Actions 页能看到进度），Release 页面会自动
#    出现新版本（自动从 draft 转为 published），里面附带：
#    - Windows: `CCNim_*_x64-setup.exe` + `.sig`
#    - macOS:   `CCNim_*_aarch64.dmg`（Apple Silicon）或 `CCNim_*_x86_64.dmg`（Intel）
#    - Linux:   `CCNim_*_amd64.AppImage` + `.tar.gz` + `.sig`
#    - `latest.json`（更新元数据）
# 4. 已经在用旧版本的用户：下次启动应用时会自动检测到此版本，或者
#    点仪表盘右上角的「检查更新」按钮立即升级
# ============================================================================

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 显式 --bundles 单平台单格式：避免在 Linux 上同时产出
          # CCNim_*.deb / cc-nim_*.deb / *.rpm / *.AppImage 一堆变体
          # 触发 tauri-action 的去重 bug（"No artifacts were found"）。
          # 同时 Linux 只保留 AppImage 也跟 updater 唯一支持的 Linux
          # 格式对齐——用户那边 `tauri-plugin-updater` 也只认 AppImage。
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--bundles dmg"
          # Ubuntu 22.04 LTS — webkit2gtk-4.1 在 24.04 之后被移除/重命名，
          # tauri-action 默认链接 4.1，所以这里固定到 22.04 是最稳的选择。
          - platform: ubuntu-22.04
            args: "--bundles appimage"

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Linux 专属系统依赖：webkit2gtk + GTK + AppIndicator + librsvg。
      # Tauri 2 在 Ubuntu 上必须有这些，缺一个 cargo build 就会以
      # "Package webkit2gtk-4.1 was not found" 之类的提示挂掉。
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 代码签名（可选，需要 Apple Developer 账号）
          # 当你有了 Apple Developer 账号后，取消下面几行的注释并配置对应的 Secrets：
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # 不设置这些环境变量时，打包出的 .dmg 未签名，用户需要右键 → 打开才能运行。
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CCNim ${{ github.ref_name }}"
          releaseBody: |
            ## 下载说明

            ### Windows
            下载 `CCNim_*_x64-setup.exe` 双击安装即可。
                        
            macOS 下载 `CCNim_*_aarch64.dmg`（Apple Silicon）或 `CCNim_*_x86_64.dmg`（Intel Mac）。

            **首次运行提示"文件损坏"怎么办？**

            由于应用未签名，macOS Gatekeeper 会拦截。按以下步骤操作：

            1. 打开终端
            2. 输入以下命令：
              ```bash
              sudo xattr -rd com.quarantine.data /Applications/CCNim.app
              ```
            3. 输入密码后回车
            4. 双击应用即可正常运行

            或者：右键应用 → 打开 → 点击"打开"按钮。
            macOS 下载 `CCNim_*_aarch64.dmg`（Apple Silicon）或 `CCNim_*_x86_64.dmg`（Intel Mac）。

            **首次运行提示"文件损坏"怎么办？**

            由于应用未签名，macOS Gatekeeper 会拦截。按以下步骤操作：

            1. 打开终端
            2. 输入以下命令：
              ```bash
              sudo xattr -rd com.quarantine.data /Applications/CCNim.app
              ```
            3. 输入密码后回车
            4. 双击应用即可正常运行

            或者：右键应用 → 打开 → 点击"打开"按钮。
            macOS 下载 `CCNim_*_aarch64.dmg`（Apple Silicon）或 `CCNim_*_x86_64.dmg`（Intel Mac）。

            **首次运行提示"文件损坏"怎么办？**

            由于应用未签名，macOS Gatekeeper 会拦截。按以下步骤操作：

            1. 打开终端
            2. 输入以下命令：
              ```bash
              sudo xattr -rd com.quarantine.data /Applications/CCNim.app
              ```
            3. 输入密码后回车
            4. 双击应用即可正常运行

            或者：右键应用 → 打开 → 点击"打开"按钮。
            macOS 下载 `CCNim_*_aarch64.dmg`（Apple Silicon）或 `CCNim_*_x86_64.dmg`（Intel Mac）。

            **首次运行提示"文件损坏"怎么办？**

            由于应用未签名，macOS Gatekeeper 会拦截。按以下步骤操作：

            1. 打开终端
            2. 输入以下命令：
              ```bash
              sudo xattr -rd com.quarantine.data /Applications/CCNim.app
              ```
            3. 输入密码后回车
            4. 双击应用即可正常运行

            或者：右键应用 → 打开 → 点击"打开"按钮。

            ### Linux
            下载 `CCNim_*_amd64.AppImage`，`chmod +x` 后双击运行。
            （AppImage 是自带运行时的便携格式，无需安装、不依赖系统包管理器，
             也是 `tauri-plugin-updater` 在 Linux 唯一支持的自动更新格式。）

            已安装旧版本的用户：下次启动应用时会自动检测到此版本，或者
            点仪表盘右上角的「检查更新」按钮立即升级。
          # 三个 matrix job 并行跑，最早跑完那个会以 draft 状态创建
          # release，剩下两个复用同名 draft 上传 asset。等所有 build job
          # 都跑完，下面的 publish-release job 会一次性把 draft 翻成
          # published。这样可以避免「第一个 job 跑完时 release 就公开
          # 了，而其余两个平台 asset 还在上传」的中间状态。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # 所有平台 build 完后，把 draft release 转为 published。
  # 失败容忍：哪怕某个平台 build 失败，只要至少一个平台成功也能 publish
  # （手动重跑失败的平台再补 asset 即可）。这里用 if: always() 确保 publish
  # 始终触发，但最后会校验确实有产物再 publish，否则 release 留 draft 让人工排查。
  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: always() && !cancelled() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # GitHub 的 /releases/tags/{tag} 端点对 draft release 会返回 404
          # （因为 draft 还没正式绑 tag），所以这里通过列表 API + jq 过滤。
          REL_JSON=$(curl -fsS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases?per_page=50" \
            | jq --arg TAG "$TAG" 'map(select(.tag_name == $TAG)) | first // empty')

          if [ -z "$REL_JSON" ] || [ "$REL_JSON" = "null" ]; then
            echo "::error::找不到 tag=$TAG 对应的 release，可能所有 build job 都失败了"
            exit 1
          fi

          REL_ID=$(echo "$REL_JSON" | jq -r '.id')
          IS_DRAFT=$(echo "$REL_JSON" | jq -r '.draft')
          ASSET_COUNT=$(echo "$REL_JSON" | jq -r '.assets | length')
          echo "release id=$REL_ID  draft=$IS_DRAFT  assets=$ASSET_COUNT"

          if [ "$ASSET_COUNT" -lt 1 ]; then
            echo "::error::release 没有任何 asset，留 draft 让人工排查"
            exit 1
          fi

          if [ "$IS_DRAFT" != "true" ]; then
            echo "release 已经 published，跳过"
            exit 0
          fi

          curl -fsS -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/$REL_ID" \
            -d '{"draft": false, "make_latest": "true"}' > /dev/null
          echo "release $REL_ID 已 publish"
